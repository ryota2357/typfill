name: Setup pnpm + Node + install
description: >
  Shared toolchain bootstrap for every CI/Deploy job: pnpm, the project's
  pinned Node version, and a frozen-lockfile install. Assumes the workflow
  has already run actions/checkout.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      with:
        version: latest
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.14.1
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
