name: Setup pnpm + Node + install
description: >
  Shared toolchain bootstrap for every CI/Deploy job: pnpm, the project's
  pinned Node version, and a frozen-lockfile install. Assumes the workflow
  has already run actions/checkout.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: latest
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.14.1
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
